<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>气排球竞赛管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========== CSS Variables ========== */
:root {
  --primary: #1565c0;
  --primary-light: #1e88e5;
  --primary-dark: #0d47a1;
  --secondary: #ff6d00;
  --secondary-light: #ff9100;
  --success: #2e7d32;
  --success-light: #4caf50;
  --danger: #c62828;
  --danger-light: #ef5350;
  --warning: #f9a825;
  --bg: #eef2f7;
  --card-bg: #ffffff;
  --text: #212121;
  --text-secondary: #616161;
  --text-light: #9e9e9e;
  --border: #e0e0e0;
  --shadow: 0 2px 8px rgba(0,0,0,0.10);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
}
input, select, textarea, button { font-family: inherit; font-size: inherit; }
button { cursor: pointer; border: none; outline: none; }
a { color: var(--primary); text-decoration: none; }

/* ========== Header ========== */
.app-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
  color: #fff; padding: 12px 20px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100;
}
.app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 8px; }
.mode-switcher { display: flex; gap: 6px; }
.mode-btn {
  padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  background: rgba(255,255,255,0.15); color: #fff; transition: var(--transition);
  border: 2px solid transparent;
}
.mode-btn:hover { background: rgba(255,255,255,0.25); }
.mode-btn.active { background: #fff; color: var(--primary); border-color: #fff; }
.logout-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: rgba(255,255,255,0.2); color: #fff; transition: var(--transition);
  border: 1px solid rgba(255,255,255,0.4);
}
.logout-btn:hover { background: rgba(255,255,255,0.35); }

/* ========== Tab Navigation ========== */
.tab-nav {
  background: #fff; border-bottom: 2px solid var(--border);
  display: flex; overflow-x: auto; padding: 0 12px;
  -webkit-overflow-scrolling: touch; position: sticky; top: 52px; z-index: 90;
}
.tab-nav::-webkit-scrollbar { height: 0; }
.tab-btn {
  padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text-secondary);
  background: none; white-space: nowrap; border-bottom: 3px solid transparent;
  transition: var(--transition); flex-shrink: 0;
}
.tab-btn:hover { color: var(--primary); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ========== Main Content ========== */
.main-content { max-width: 1200px; margin: 0 auto; padding: 16px 12px 60px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.tab-panel { animation: fadeIn 0.25s ease; }

/* ========== Cards ========== */
.card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 18px; margin-bottom: 14px; transition: var(--transition);
}
.card:hover { box-shadow: var(--shadow-lg); }
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.card-title { font-size: 17px; font-weight: 700; color: var(--text); }

/* ========== Buttons ========== */
.btn {
  padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px;
  font-weight: 600; transition: var(--transition); display: inline-flex;
  align-items: center; gap: 5px; white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--secondary); color: #fff; }
.btn-secondary:hover { background: #e65100; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #1b5e20; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b71c1c; }
.btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: var(--primary); color: #fff; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-warning { background: var(--warning); color: var(--text); }
.btn-warning:hover { background: #f57f17; }

/* ========== Forms ========== */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; transition: var(--transition); background: #fff;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: flex; gap: 10px; flex-wrap: wrap; }
.form-row > * { flex: 1; min-width: 140px; }

/* ========== Tables ========== */
.table-wrap { overflow-x: auto; border-radius: var(--radius-sm); -webkit-overflow-scrolling: touch; }
.data-table {
  width: 100%; border-collapse: collapse; font-size: 13px; min-width: 560px;
}
.data-table th, .data-table td {
  padding: 9px 10px; text-align: left; border-bottom: 1px solid var(--border);
}
.data-table th {
  background: #f5f7fa; font-weight: 600; color: var(--text-secondary);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}
.data-table tr:hover td { background: #f8fafd; }
.data-table .editable-cell {
  cursor: pointer; position: relative; min-width: 50px;
}
.data-table .editable-cell:hover { background: #e3f2fd; }
.data-table .cell-input {
  width: 100%; padding: 3px 5px; border: 2px solid var(--primary);
  border-radius: 4px; font-size: 12px; outline: none;
}
.data-table .cell-select {
  padding: 3px 5px; border: 2px solid var(--primary);
  border-radius: 4px; font-size: 12px; outline: none; background: #fff;
}

/* ========== Score Card ========== */
.score-card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; margin-bottom: 0;
}
.score-card-header {
  padding: 10px 14px; font-size: 13px; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px;
}
.score-card-header.upcoming { background: linear-gradient(135deg, #e3f2fd, #bbdefb); color: var(--primary-dark); }
.score-card-header.completed { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); color: var(--success); }
.score-card-header.winner-a { background: linear-gradient(135deg, #fff3e0, #ffe0b2); color: #e65100; }
.score-card-header.winner-b { background: linear-gradient(135deg, #fce4ec, #f8bbd0); color: #880e4f; }
.score-card-body { padding: 14px; }
.score-team-row {
  display: flex; align-items: center; gap: 6px; padding: 7px 0;
  border-bottom: 1px dashed var(--border); flex-wrap: nowrap;
}
.score-team-row:last-child { border-bottom: none; }
.team-name {
  font-weight: 700; font-size: 14px; min-width: 70px; max-width: 110px;
  flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.team-name.winner { color: var(--secondary); }
.score-input {
  width: 46px; padding: 5px 2px; text-align: center; border: 2px solid var(--border);
  border-radius: 6px; font-size: 15px; font-weight: 700;
}
.score-input:focus { border-color: var(--primary); outline: none; }
.score-label { font-size: 10px; color: var(--text-light); text-align: center; }
.score-total {
  font-size: 13px; font-weight: 700; color: var(--primary); min-width: 36px; text-align: center;
}
.score-sets {
  font-size: 13px; font-weight: 700; color: var(--secondary); min-width: 28px; text-align: center;
}
.score-points {
  font-size: 13px; font-weight: 700; color: #7b1fa2; min-width: 28px; text-align: center;
}
.quick-win-btn {
  padding: 1px 6px; font-size: 9px; border-radius: 3px;
  background: var(--warning); color: #fff; font-weight: 600; margin-top: 2px;
}
.quick-win-btn:hover { background: #f57f17; }
.set-col { text-align: center; flex-shrink: 0; }
.stat-col { text-align: center; flex-shrink: 0; margin-left: 4px; }

/* ========== Score Grid (2 cards per row) ========== */
.score-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 14px;
}
@media (max-width: 768px) {
  .score-grid { grid-template-columns: 1fr; }
}

/* ========== Stage Section (Card Style) ========== */
.stage-section {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; margin-bottom: 20px; transition: var(--transition);
}
.stage-section:hover { box-shadow: var(--shadow-lg); }
.stage-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px; font-size: 17px; font-weight: 700;
}
.stage-header.group-stage { background: linear-gradient(135deg, #e3f2fd, #bbdefb); color: var(--primary-dark); }
.stage-header.knockout-stage { background: linear-gradient(135deg, #fff3e0, #ffe0b2); color: #e65100; }
.stage-header .stage-icon { font-size: 22px; }
.stage-body { padding: 14px 16px 16px; }

/* Sub-group card within stage */
.stage-group-card {
  background: #f8fafd; border-radius: var(--radius-sm); border: 1px solid var(--border);
  margin-bottom: 14px; overflow: hidden;
}
.stage-group-card:last-child { margin-bottom: 0; }
.stage-group-header {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; font-size: 14px; font-weight: 700;
  background: linear-gradient(135deg, #e8eaf6, #c5cae9); color: var(--primary-dark);
}
.stage-group-body { padding: 12px 14px; }

/* ========== Schedule Card ========== */
.sch-card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--primary);
  transition: var(--transition);
}
.sch-card:hover { box-shadow: var(--shadow-lg); }
.sch-card.completed { border-left-color: var(--success); }
.sch-card .sch-row { display: flex; gap: 8px; font-size: 13px; padding: 2px 0; flex-wrap: wrap; }
.sch-card .sch-label { color: var(--text-light); min-width: 50px; flex-shrink: 0; }
.sch-card .sch-val { font-weight: 600; }
.sch-card .sch-teams { font-size: 15px; font-weight: 700; margin: 6px 0; text-align: center; }

/* ========== Conflict Warning ========== */
.conflict-warning {
  background: #fff3e0; border: 1px solid #ffb74d; border-radius: var(--radius-sm);
  padding: 8px 12px; font-size: 12px; color: #e65100; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.conflict-warning::before { content: "⚠️"; }

/* ========== Photo Gallery ========== */
.folder-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.folder-card {
  background: linear-gradient(135deg, #e3f2fd, #bbdefb); border-radius: var(--radius);
  padding: 14px 20px; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 8px; min-width: 140px;
}
.folder-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.folder-card.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
.folder-icon { font-size: 24px; }
.photo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.photo-item {
  border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow);
  position: relative; aspect-ratio: 4/3; background: #f5f5f5;
}
.photo-item img {
  width: 100%; height: 100%; object-fit: cover; cursor: pointer;
  transition: var(--transition);
}
.photo-item img:hover { transform: scale(1.05); }
.photo-item .photo-title {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: #fff; padding: 18px 8px 6px; font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.photo-item .photo-delete {
  position: absolute; top: 5px; right: 5px; width: 24px; height: 24px;
  border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff;
  font-size: 12px; display: none; align-items: center; justify-content: center;
}
.photo-item:hover .photo-delete { display: flex; }
.photo-item .photo-edit-title {
  position: absolute; top: 5px; left: 5px; width: 24px; height: 24px;
  border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff;
  font-size: 11px; display: none; align-items: center; justify-content: center;
}
.photo-item:hover .photo-edit-title { display: flex; }

/* ========== Announcement ========== */
.announcement-item {
  border-left: 4px solid var(--primary); padding: 14px 18px;
  background: #fff; margin-bottom: 10px; border-radius: 0 var(--radius) var(--radius) 0;
  box-shadow: var(--shadow);
}
.announcement-item h3 { font-size: 15px; margin-bottom: 3px; }
.announcement-item .date { font-size: 12px; color: var(--text-light); }
.announcement-item .content { font-size: 13px; color: var(--text-secondary); margin-top: 6px; white-space: pre-wrap; }
.ann-img-wrap { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.ann-img-wrap img { max-width: 100%; height: auto; border-radius: var(--radius-sm); cursor: pointer; display: block; }
.ann-img-grid { margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.ann-img-grid img { width: 100%; height: auto; border-radius: var(--radius-sm); cursor: pointer; display: block; object-fit: cover; }
.ann-img-modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center; }
.ann-img-modal-overlay.active { display:flex; }
.ann-img-modal-overlay img { max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--radius); }
.ann-img-upload-area { margin-top:8px; }
.ann-img-upload-thumbs { display:flex;flex-wrap:wrap;gap:6px;margin-top:6px; }
.ann-img-upload-thumbs img { width:80px;height:80px;object-fit:cover;border-radius:var(--radius-sm);border:2px solid var(--border); }
.ann-img-upload-thumbs .thumb-remove { position:relative; }
.ann-img-upload-thumbs .thumb-remove button { position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:12px;cursor:pointer;line-height:20px;text-align:center;padding:0; }

/* ========== Modal ========== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: var(--radius); padding: 24px;
  max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ========== Toast ========== */
.toast-container {
  position: fixed; top: 70px; right: 16px; z-index: 300;
  display: flex; flex-direction: column; gap: 6px;
}
.toast {
  padding: 10px 18px; border-radius: var(--radius-sm); color: #fff;
  font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
  animation: toastIn 0.25s ease; min-width: 180px; max-width: 320px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); color: var(--text); }
.toast.info { background: var(--primary); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ========== Status Badge ========== */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-upcoming { background: #e3f2fd; color: var(--primary); }
.badge-completed { background: #e8f5e9; color: var(--success); }
.badge-category { background: #fff3e0; color: #e65100; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.badge-subgroup { background: #e8eaf6; color: var(--primary-dark); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }

/* ========== Empty State ========== */
.empty-state { text-align: center; padding: 36px 16px; color: var(--text-light); }
.empty-state .icon { font-size: 42px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* ========== Lightbox ========== */
.lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 500; align-items: center; justify-content: center; cursor: pointer;
}
.lightbox.active { display: flex; }
.lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 6px; }

/* ========== Team Points Card ========== */
.team-points-card {
  background: linear-gradient(135deg, #f3e5f5, #e1bee7);
  border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
  box-shadow: var(--shadow); transition: var(--transition);
}
.team-points-card:hover { box-shadow: var(--shadow-lg); }
.team-points-card .tp-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.team-points-card .tp-team { font-size: 16px; font-weight: 700; color: #4a148c; }
.team-points-card .tp-total { font-size: 22px; font-weight: 800; color: #7b1fa2; }
.team-points-card .tp-breakdown { font-size: 12px; color: #6a1b9a; }
.team-points-card .tp-detail { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }

/* ========== Group Standings Sub-header ========== */
.group-sub-header {
  background: linear-gradient(135deg, #e8eaf6, #c5cae9);
  padding: 8px 14px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; color: var(--primary-dark);
  margin: 10px 0 8px;
}

/* ========== Registration Closed ========== */
.reg-closed {
  background: linear-gradient(135deg, #ffebee, #ffcdd2); border: 2px solid #ef9a9a;
  border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 14px;
}
.reg-closed .icon { font-size: 36px; margin-bottom: 8px; }
.reg-closed h3 { color: var(--danger); font-size: 16px; }
.reg-closed p { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }

/* ========== Bracket (对阵表) ========== */
.bracket-wrap {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 16px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.bracket-title {
  font-size: 16px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.bracket { display: flex; align-items: stretch; min-height: 240px; position: relative; min-width: max-content; }
.bracket-round { display: flex; flex-direction: column; flex: 0 0 auto; min-width: 140px; }
.bracket-round-label {
  text-align: center; font-size: 12px; font-weight: 700; color: var(--primary);
  padding: 4px 8px; background: #e3f2fd; border-radius: 4px; margin: 0 6px 8px; white-space: nowrap;
}
.bracket-round-matches {
  display: flex; flex-direction: column; justify-content: space-around; flex: 1; padding: 0 6px;
}
.bracket-match {
  background: #fff; border: 2px solid var(--border); border-radius: 8px;
  overflow: hidden; margin: 4px 0; transition: var(--transition); position: relative;
}
.bracket-match:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: var(--primary-light); }
.bm-team {
  display: flex; align-items: center; padding: 5px 8px; font-size: 12px;
  gap: 4px; min-height: 28px;
}
.bm-team + .bm-team { border-top: 1px solid #f0f0f0; }
.bm-team.win { background: #e8f5e9; font-weight: 700; color: var(--success); }
.bm-team.lose { color: var(--text-light); }
.bm-seed { font-size: 10px; color: var(--text-light); min-width: 16px; text-align: center; }
.bm-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bm-name.editable { cursor: pointer; border-bottom: 1px dashed var(--primary); }
.bm-name.editable:hover { color: var(--primary); }
.bm-sets { font-weight: 700; min-width: 18px; text-align: center; color: var(--secondary); font-size: 14px; }
.bracket-champion {
  display: flex; align-items: center; justify-content: center; padding: 12px;
  font-size: 16px; font-weight: 800; color: #e65100;
  background: linear-gradient(135deg, #fff8e1, #ffecb3); border-radius: 8px; margin-top: 12px;
  border: 2px solid #ffb300;
}
.bracket-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
.bracket-match { z-index: 2; position: relative; }

</head>
<body>

<!-- ========== Toast Container ========== -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// DATA LAYER - localStorage CRUD
// ============================================================
const DB = {
  _prefix: 'vb_',
  get(key, def=[]) {
    try { const d = JSON.parse(localStorage.getItem(this._prefix + key)); return d != null ? d : def; }
    catch { return def; }
  },
  set(key, data) {
    try { localStorage.setItem(this._prefix + key, JSON.stringify(data)); }
    catch(e) { toast('存储空间不足，请清理照片数据', 'error'); }
    // Auto-sync to IndexedDB after every write
    IDB.sync();
    // Auto-push to cloud (debounced)
    Cloud.autoPush();
  },
  getTournaments() { return this.get('tournaments'); },
  saveTournaments(d) { this.set('tournaments', d); },
  getRegistrations() { return this.get('registrations'); },
  saveRegistrations(d) { this.set('registrations', d); },
  getSchedules() { return this.get('schedules'); },
  saveSchedules(d) { this.set('schedules', d); },
  getScores() {
    const data = this.get('scores', {});
    if (Array.isArray(data)) {
      const obj = {};
      for (const key of Object.keys(data)) {
        if (!/^\d+$/.test(key)) obj[key] = data[key];
      }
      this.saveScores(obj);
      return obj;
    }
    return data;
  },
  saveScores(d) { this.set('scores', d); },
  getPhotoFolders() { return this.get('photoFolders'); },
  savePhotoFolders(d) { this.set('photoFolders', d); },
  getAnnouncements() { return this.get('announcements'); },
  saveAnnouncements(d) { this.set('announcements', d); },
  getAdminPassword() { return this.get('adminPwd', 'admin123'); },
  saveAdminPassword(d) { this.set('adminPwd', d); }
};

// ============================================================
// IndexedDB Database Layer (persistent, backup-capable)
// ============================================================
const IDB = {
  _dbName: 'volley2_db',
  _ver: 2,
  _storeData: 'app_data',
  _storeBackup: 'backups',
  _db: null,
  _syncTimer: null,
  _autoBackupInterval: null,

  async init() {
    try {
      const dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(this._dbName, this._ver);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(this._storeData)) {
            db.createObjectStore(this._storeData);
          }
          if (!db.objectStoreNames.contains(this._storeBackup)) {
            const bs = db.createObjectStore(this._storeBackup, { keyPath: 'id' });
            bs.createIndex('time', 'time');
          }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
        req.onblocked = () => reject(new Error('IndexedDB blocked'));
      });
      const timeoutPromise = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('IndexedDB init timeout')), 5000)
      );
      this._db = await Promise.race([dbPromise, timeoutPromise]);
      // Restore localStorage from IndexedDB if localStorage is empty
      await this.restoreToLS();
      // Start auto-backup every 5 minutes
      this.startAutoBackup();
    } catch(e) {
      console.warn('IndexedDB not available, using localStorage only:', e);
      this._db = null;
    }
  },

  _tx(store, mode) {
    const tx = this._db.transaction(store, mode);
    return tx.objectStore(store);
  },

  _promisify(req) {
    return new Promise((resolve, reject) => {
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  // Save all localStorage data to IndexedDB (debounced, fire-and-forget)
  sync() {
    if (!this._db) return;
    clearTimeout(this._syncTimer);
    this._syncTimer = setTimeout(() => {
      this._doSync().catch(e => console.warn('IDB auto-sync error:', e));
    }, 300);
  },

  // Internal: perform actual sync
  async _doSync() {
    if (!this._db) return;
    const keys = ['tournaments','registrations','schedules','scores','announcements','photoFolders','adminPwd'];
    const tx = this._db.transaction(this._storeData, 'readwrite');
    const store = tx.objectStore(this._storeData);
    for (const k of keys) {
      const raw = localStorage.getItem('vb_' + k);
      store.put(raw ? JSON.parse(raw) : null, k);
    }
    store.put(Date.now(), '_lastSync');
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    localStorage.setItem('vb__lsSyncTime', String(Date.now()));
  },

  // Force immediate sync and return a Promise
  async syncNow() {
    if (!this._db) return;
    clearTimeout(this._syncTimer);
    return this._doSync();
  },

  // Restore localStorage from IndexedDB
  async restoreToLS() {
    if (!this._db) return;
    try {
      const store = this._tx(this._storeData, 'readonly');
      const lastSync = await this._promisify(store.get('_lastSync'));
      const lsTime = localStorage.getItem('vb__lsSyncTime');
      // Only restore if IndexedDB is newer or localStorage is empty
      if (lastSync && (!lsTime || lastSync > Number(lsTime))) {
        const keys = ['tournaments','registrations','schedules','scores','announcements','photoFolders','adminPwd'];
        let restored = false;
        for (const k of keys) {
          const data = await this._promisify(store.get(k));
          if (data != null) {
            localStorage.setItem('vb_' + k, JSON.stringify(data));
            restored = true;
          }
        }
        if (restored) localStorage.setItem('vb__lsSyncTime', String(lastSync));
      }
    } catch(e) { console.warn('IDB restore error:', e); }
  },

  // Create a timestamped backup snapshot
  async createBackup(label) {
    if (!this._db) return;
    const id = genId();
    const backup = {
      id,
      label: label || '',
      time: Date.now(),
      data: {
        tournaments: DB.getTournaments(),
        registrations: DB.getRegistrations(),
        schedules: DB.getSchedules(),
        scores: DB.getScores(),
        announcements: DB.getAnnouncements(),
        photoFolders: DB.getPhotoFolders(),
        adminPwd: DB.getAdminPassword()
      }
    };
    const store = this._tx(this._storeBackup, 'readwrite');
    await this._promisify(store.add(backup));
    return id;
  },

  // List all backups (newest first)
  async getBackups() {
    if (!this._db) return [];
    const store = this._tx(this._storeBackup, 'readonly');
    const all = await this._promisify(store.getAll());
    return all.sort((a, b) => b.time - a.time);
  },

  // Restore from a backup
  async restoreFromBackup(id) {
    if (!this._db) return false;
    const store = this._tx(this._storeBackup, 'readonly');
    const backup = await this._promisify(store.get(id));
    if (!backup || !backup.data) return false;
    const d = backup.data;
    if (d.tournaments != null) DB.saveTournaments(d.tournaments);
    if (d.registrations != null) DB.saveRegistrations(d.registrations);
    if (d.schedules != null) DB.saveSchedules(d.schedules);
    if (d.scores != null) DB.saveScores(d.scores);
    if (d.announcements != null) DB.saveAnnouncements(d.announcements);
    if (d.photoFolders != null) DB.savePhotoFolders(d.photoFolders);
    if (d.adminPwd != null) DB.saveAdminPassword(d.adminPwd);
    return true;
  },

  // Delete a backup
  async deleteBackup(id) {
    if (!this._db) return;
    const store = this._tx(this._storeBackup, 'readwrite');
    await this._promisify(store.delete(id));
  },

  // Start auto-backup every 5 minutes
  startAutoBackup() {
    if (this._autoBackupInterval) clearInterval(this._autoBackupInterval);
    this._autoBackupInterval = setInterval(async () => {
      try {
        // Only auto-backup if there's data
        if (DB.getTournaments().length > 0 || DB.getRegistrations().length > 0 || DB.getSchedules().length > 0) {
          await this.createBackup('自动备份');
          // Keep only last 20 auto-backups
          const backups = await this.getBackups();
          const autoBackups = backups.filter(b => b.label === '自动备份');
          if (autoBackups.length > 20) {
            for (let i = 20; i < autoBackups.length; i++) {
              await this.deleteBackup(autoBackups[i].id);
            }
          }
        }
      } catch(e) { console.warn('Auto-backup error:', e); }
    }, 5 * 60 * 1000);
  },

  // Get storage size estimate
  async getStorageInfo() {
    if (!this._db) return { lsSize: 0, idbSize: 0, backupCount: 0 };
    let lsSize = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('vb_')) lsSize += localStorage.getItem(k).length * 2; // UTF-16
    }
    const backups = await this.getBackups();
    return {
      lsSize,
      idbSize: Math.round(lsSize * 1.1), // approximate
      backupCount: backups.length,
      lastSync: localStorage.getItem('vb__lsSyncTime') || '-'
    };
  }
};

// ============================================================
// Cloud Sync Layer (Supabase REST API + Realtime)
// ============================================================
// ========== Supabase 配置（硬编码，所有访客打开页面即自动连接云端） ==========
const SUPABASE_URL = 'https://hqzyebjpazaircvymxp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_I8BqJK0wQFMRqZ6oeHSYWw_e0wpxrz4';
// 管理员可在后台「系统设置 → 云端同步」中覆盖以上默认值
// ===================================================================================

let supabaseClient = null;

function initSupabase(url, key) {
  // 允许重新初始化（管理员在后台更改配置时）
  try {
    supabaseClient = window.supabase.createClient(url, key, {
      realtime: { params: { eventsPerSecond: 2 } }
    });
    console.log('[Cloud] Supabase client initialized');
  } catch(e) {
    console.warn('[Cloud] Supabase client init failed:', e.message);
  }
}

const Cloud = {
  _url: '',
  _key: '',
  _deviceId: '',
  _pushTimer: null,
  _enabled: false,
  _realtimeChannel: null,
  _applyingRemote: false,
  _syncStatus: 'offline',  // offline | syncing | synced | error
  _pollTimer: null,

  init() {
    // 优先使用 localStorage（管理员可能已在后台覆盖配置），否则使用硬编码默认值
    const defaultUrl = (typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL.indexOf('请替换') === -1) ? SUPABASE_URL : '';
    const defaultKey = (typeof SUPABASE_ANON_KEY !== 'undefined' && SUPABASE_ANON_KEY.indexOf('请替换') === -1) ? SUPABASE_ANON_KEY : '';
    // 注意：localStorage.getItem 返回 null 表示"从未保存过"（用默认值），返回 "" 表示"用户清除了配置"（禁用云端）
    const savedUrl = localStorage.getItem('vb_cloudUrl');
    const savedKey = localStorage.getItem('vb_cloudKey');
    this._url = (savedUrl !== null) ? savedUrl : defaultUrl;
    this._key = (savedKey !== null) ? savedKey : defaultKey;
    this._deviceId = localStorage.getItem('vb_deviceId') || this._generateDeviceId();
    this._enabled = !!(this._url && this._key);
    this._updateStatusUI();
    console.log('[Cloud] init: enabled=' + this._enabled + ', url=' + (this._url ? this._url.slice(0, 30) + '...' : 'empty'));
  },

  _generateDeviceId() {
    const id = 'dev_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    localStorage.setItem('vb_deviceId', id);
    return id;
  },

  isConfigured() {
    return this._enabled;
  },

  getStatus() {
    return {
      configured: this._enabled,
      url: this._url ? this._url.replace(/^(https?:\/\/[^\/]+).*$/, '$1') : '',
      deviceId: this._deviceId,
      syncStatus: this._syncStatus,
      lastPush: localStorage.getItem('vb_cloudLastPush') || '-',
      lastPull: localStorage.getItem('vb_cloudLastPull') || '-'
    };
  },

  configure(url, key) {
    this._url = (url || '').trim().replace(/\/$/, '');
    this._key = (key || '').trim();
    this._enabled = !!(this._url && this._key);
    localStorage.setItem('vb_cloudUrl', this._url);
    localStorage.setItem('vb_cloudKey', this._key);
    if (this._enabled) {
      initSupabase(this._url, this._key);
      this.subscribe();
    }
    return this._enabled;
  },

  // Build request headers for Supabase REST API
  // Note: sb_publishable_ keys are NOT JWTs, so skip Bearer token for non-JWT keys
  _headers() {
    const h = {
      'apikey': this._key,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    // Only add Bearer token if key looks like a JWT (eyJ prefix)
    // sb_publishable_ / sb_secret_ keys use apikey header only
    if (this._key && (this._key.startsWith('eyJ') || this._key.startsWith('sb_secret'))) {
      h['Authorization'] = 'Bearer ' + this._key;
    }
    return h;
  },

  // Update sync status UI indicator
  _updateStatusUI() {
    const el = document.getElementById('syncStatus');
    const dot = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    if (!el) return;
    if (!this._enabled) { el.style.display = 'none'; return; }
    el.style.display = 'inline-flex';
    dot.className = 'sync-dot ' + this._syncStatus;
    const labels = { offline: '离线', syncing: '同步中', synced: '已同步', error: '同步异常' };
    label.textContent = labels[this._syncStatus] || '离线';
  },

  // Test connection to Supabase
  async test() {
    if (!this._enabled) return { ok: false, error: '未配置云端同步' };
    try {
      const resp = await fetch(this._url + '/rest/v1/app_data?select=id&limit=1', {
        method: 'GET',
        headers: this._headers()
      });
      if (resp.ok || resp.status === 406) {
        return { ok: true };
      }
      const text = await resp.text();
      return { ok: false, error: 'HTTP ' + resp.status + ': ' + text.slice(0, 200) };
    } catch(e) {
      return { ok: false, error: e.message };
    }
  },

  // Push local data to cloud (upsert row id=1)
  async push() {
    if (!this._enabled) return false;
    this._syncStatus = 'syncing';
    this._updateStatusUI();
    try {
      const payload = {
        id: 1,
        data: {
          tournaments: DB.getTournaments(),
          registrations: DB.getRegistrations(),
          schedules: DB.getSchedules(),
          scores: DB.getScores(),
          announcements: DB.getAnnouncements(),
          photoFolders: DB.getPhotoFolders(),
          adminPwd: DB.getAdminPassword()
        },
        updated_at: new Date().toISOString(),
        device_id: this._deviceId
      };
      const resp = await fetch(this._url + '/rest/v1/app_data?id=eq.1', {
        method: 'POST',
        headers: { ...this._headers(), 'Prefer': 'resolution=merge-duplicates,return=representation' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        // Try PATCH if POST failed (row already exists)
        const patchResp = await fetch(this._url + '/rest/v1/app_data?id=eq.1', {
          method: 'PATCH',
          headers: this._headers(),
          body: JSON.stringify({
            data: payload.data,
            updated_at: payload.updated_at,
            device_id: this._deviceId
          })
        });
        if (!patchResp.ok) {
          const err = await patchResp.text();
          throw new Error('Cloud push failed: ' + patchResp.status + ' ' + err.slice(0, 200));
        }
      }
      localStorage.setItem('vb_cloudLastPush', new Date().toLocaleString());
      this._syncStatus = 'synced';
      this._updateStatusUI();
      console.log('[Cloud] Push success at', new Date().toLocaleString());
      return true;
    } catch(e) {
      this._syncStatus = 'error';
      this._updateStatusUI();
      console.warn('[Cloud] Push error:', e.message);
      return false;
    }
  },

  // Pull data from cloud
  async pull() {
    if (!this._enabled) return null;
    try {
      const resp = await fetch(this._url + '/rest/v1/app_data?id=eq.1&select=*', {
        method: 'GET',
        headers: this._headers()
      });
      if (!resp.ok) {
        throw new Error('Cloud pull failed: ' + resp.status);
      }
      const rows = await resp.json();
      if (!rows || !rows.length || !rows[0].data) {
        return null; // No cloud data yet
      }
      const cloudData = rows[0].data;
      const cloudDevice = rows[0].device_id;
      const cloudTime = rows[0].updated_at;
      // Conflict detection: if cloud data was written by another device
      const isConflict = cloudDevice && cloudDevice !== this._deviceId;
      localStorage.setItem('vb_cloudLastPull', new Date().toLocaleString());
      return { data: cloudData, conflict: isConflict, cloudTime };
    } catch(e) {
      console.warn('[Cloud] Pull error:', e.message);
      return null;
    }
  },

  // Auto-push after writes (debounced), skip if applying remote data
  autoPush() {
    if (!this._enabled || this._applyingRemote) return;
    clearTimeout(this._pushTimer);
    this._pushTimer = setTimeout(() => {
      this.push().catch(() => {});
    }, 3000); // 3s debounce
  },

  // Subscribe to Supabase Realtime for cross-device sync
  subscribe() {
    if (!this._enabled || this._realtimeChannel) return;
    if (!supabaseClient) {
      console.warn('[Cloud] No Supabase client, falling back to polling');
      this._startPolling();
      return;
    }
    try {
      const self = this;
      this._realtimeChannel = supabaseClient
        .channel('app_data_changes')
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'app_data' },
          (payload) => {
            const newData = payload.new && payload.new.data;
            const remoteDevice = payload.new && payload.new.device_id;
            if (!newData || remoteDevice === self._deviceId) return;
            console.log('[Cloud] Realtime change from device:', remoteDevice);
            self._applyCloudData(newData);
            renderCurrentTab();
          }
        )
        .subscribe((status) => {
          console.log('[Cloud] Realtime status:', status);
          if (status === 'SUBSCRIBED') {
            self._syncStatus = 'synced';
            self._updateStatusUI();
          } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
            self._syncStatus = 'error';
            self._updateStatusUI();
            // Fall back to polling
            self._startPolling();
          }
        });
      console.log('[Cloud] Realtime subscribed');
    } catch(e) {
      console.warn('[Cloud] Realtime subscribe failed, falling back to polling:', e);
      this._startPolling();
    }
  },

  // Unsubscribe from Realtime
  unsubscribe() {
    if (this._realtimeChannel && supabaseClient) {
      try { supabaseClient.removeChannel(this._realtimeChannel); } catch(e) {}
      this._realtimeChannel = null;
    }
    if (this._pollTimer) {
      clearInterval(this._pollTimer);
      this._pollTimer = null;
    }
  },

  // Apply cloud data to local storage (silent, does not trigger Cloud.push)
  _applyCloudData(data) {
    this._applyingRemote = true;
    try {
      if (data.tournaments !== undefined) DB.saveTournaments(data.tournaments);
      if (data.registrations !== undefined) DB.saveRegistrations(data.registrations);
      if (data.schedules !== undefined) DB.saveSchedules(data.schedules);
      if (data.scores !== undefined) DB.saveScores(data.scores);
      if (data.announcements !== undefined) DB.saveAnnouncements(data.announcements);
      if (data.photoFolders !== undefined) DB.savePhotoFolders(data.photoFolders);
      if (data.adminPwd !== undefined) DB.saveAdminPassword(data.adminPwd);
      this._syncStatus = 'synced';
      this._updateStatusUI();
      console.log('[Cloud] Remote data applied successfully');
    } catch(e) {
      console.warn('[Cloud] Apply cloud data error:', e);
    } finally {
      this._applyingRemote = false;
    }
  },

  // Fallback: polling every 30 seconds when Realtime unavailable
  _startPolling() {
    if (this._pollTimer) return; // Already polling
    console.log('[Cloud] Starting polling mode (30s interval)');
    this._pollTimer = setInterval(() => this._pollOnce(), 30000);
  },

  async _pollOnce() {
    if (!this._enabled) return;
    try {
      const result = await this.pull();
      if (result && result.data && result.conflict) {
        this._applyCloudData(result.data);
        renderCurrentTab();
      }
    } catch(e) {
      console.warn('[Cloud] Poll error:', e.message);
    }
  }
};

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Check if registration is open for a tournament
function isRegOpen(tournamentId) {
  const t = DB.getTournaments().find(x => x.id === tournamentId);
  if (!t) return false;
  if (!t.regStartTime && !t.regEndTime) return true; // no time restriction
  const now = new Date().getTime();
  if (t.regStartTime) {
    const start = new Date(t.regStartTime).getTime();
    if (now < start) return false;
  }
  if (t.regEndTime) {
    const end = new Date(t.regEndTime).getTime();
    if (now > end) return false;
  }
  return true;
}

// Get registration time status message
function getRegTimeMsg(tournamentId) {
  const t = DB.getTournaments().find(x => x.id === tournamentId);
  if (!t) return '';
  if (!t.regStartTime && !t.regEndTime) return '';
  const now = new Date().getTime();
  if (t.regStartTime && now < new Date(t.regStartTime).getTime()) {
    return `报名尚未开始，开始时间：${t.regStartTime.replace('T', ' ')}`;
  }
  if (t.regEndTime && now > new Date(t.regEndTime).getTime()) {
    return `报名已截止，截止时间：${t.regEndTime.replace('T', ' ')}`;
  }
  return '';
}

// ============================================================
function saveMatchScore(scheduleId, sets, winner) {
  let scores = DB.getScores();
  if (Array.isArray(scores) || typeof scores !== 'object') { scores = {}; }
  scores[scheduleId] = { sets, winner, saved: true };
  DB.saveScores(scores);
}
function deleteMatchScore(scheduleId) {
  let scores = DB.getScores();
  if (Array.isArray(scores) || typeof scores !== 'object') { scores = {}; }
  delete scores[scheduleId];
  DB.saveScores(scores);
}
function calculateWinner(sets) {
  let aWins = 0, bWins = 0;
  for (const s of sets) {
    const a = parseInt(s.teamA), b = parseInt(s.teamB);
    if (!isNaN(a) && !isNaN(b) && a > b) aWins++;
    else if (!isNaN(a) && !isNaN(b) && b > a) bWins++;
  }
  if (aWins >= 2) return 'A';
  if (bWins >= 2) return 'B';
  return '';
}

function resolveTeamName(teamRef, schedules, scores) {
  if (!teamRef) return '待定';
  let match = teamRef.match(/^场序(\d+)胜者$/);
  if (match) {
    const order = parseInt(match[1]);
    const sch = schedules.find(s => s.order === order);
    if (sch && scores[sch.id] && scores[sch.id].winner) {
      const resolved = scores[sch.id].winner === 'A' ? (sch.teamA || '待定') : (sch.teamB || '待定');
      if (resolved.match(/^场序\d+[胜负]者$/)) return resolveTeamName(resolved, schedules, scores);
      return resolved;
    }
    return teamRef + '(未决出)';
  }
  match = teamRef.match(/^场序(\d+)负者$/);
  if (match) {
    const order = parseInt(match[1]);
    const sch = schedules.find(s => s.order === order);
    if (sch && scores[sch.id] && scores[sch.id].winner) {
      const resolved = scores[sch.id].winner === 'A' ? (sch.teamB || '待定') : (sch.teamA || '待定');
      if (resolved.match(/^场序\d+[胜负]者$/)) return resolveTeamName(resolved, schedules, scores);
      return resolved;
    }
    return teamRef + '(未决出)';
  }
  return teamRef;
}

function checkScheduleConflict(scheduleId, date, time, category, subGroup, teamA, teamB, venue) {
  if (!date || !time) return [];
  const schedules = DB.getSchedules();
  const conflicts = [];
  const teams = [teamA, teamB].filter(t => t && t !== '待定' && !t.match(/^场序/));

  for (const s of schedules) {
    if (s.id === scheduleId) continue;
    if (s.date !== date || s.time !== time) continue;
    if (category && s.category && s.category !== category) continue;
    if (subGroup && s.subGroup && s.subGroup !== subGroup) continue;
    if (s.venue === venue) continue;
    const sTeams = [s.teamA, s.teamB].filter(t => t && t !== '待定' && !t.match(/^场序/));
    for (const team of teams) {
      if (sTeams.includes(team)) {
        conflicts.push({ team, schedule: s });
      }
    }
  }
  return conflicts;
}

function showConflictWarning(conflicts) {
  if (!conflicts.length) return '';
  return conflicts.map(c =>
    `<div class="conflict-warning">队伍"${esc(c.team)}"在${c.schedule.date} ${c.schedule.time}已有安排，请确认是否有误</div>`
  ).join('');
}

// ============================================================
// BRACKET SYSTEM - 对阵表
// ============================================================

// Auto-detect bracket structure from knockout schedules (BFS from final)
function detectBracketRounds(tournamentId) {
  const schedules = DB.getSchedules().filter(s => s.tournamentId === tournamentId && (s.stage||'小组赛') === '第二阶段');
  if (!schedules.length) return null;

  const byOrder = {};
  schedules.forEach(s => { byOrder[s.order] = s; });

  // Find which orders are referenced by other schedules' teamA/teamB
  const isReferenced = {};
  schedules.forEach(s => {
    const mA = String(s.teamA||'').match(/^场序(\d+)/);
    const mB = String(s.teamB||'').match(/^场序(\d+)/);
    if (mA) isReferenced[parseInt(mA[1])] = true;
    if (mB) isReferenced[parseInt(mB[1])] = true;
  });

  // Final = the schedule not referenced by anyone
  let finalMatch = schedules.find(s => !isReferenced[s.order]);
  if (!finalMatch) {
    // Fallback: highest order as final
    const sorted = [...schedules].sort((a,b) => (b.order||0) - (a.order||0));
    finalMatch = sorted[0];
  }

  // BFS from final → build rounds (first round at index 0)
  const rounds = [];
  let currentLevel = [finalMatch];
  const visited = new Set();

  while (currentLevel.length > 0) {
    const nextLevel = [];
    const roundMatches = [];

    for (const s of currentLevel) {
      if (visited.has(s.order)) continue;
      visited.add(s.order);
      roundMatches.push(s);

      // Find feeder matches from teamA / teamB references
      const mA = String(s.teamA||'').match(/^场序(\d+)(胜者|负者)$/);
      const mB = String(s.teamB||'').match(/^场序(\d+)(胜者|负者)$/);
      if (mA) { const dep = byOrder[parseInt(mA[1])]; if (dep && !visited.has(dep.order)) nextLevel.push(dep); }
      if (mB) { const dep = byOrder[parseInt(mB[1])]; if (dep && !visited.has(dep.order)) nextLevel.push(dep); }
    }

    roundMatches.sort((a,b) => (a.order||0) - (b.order||0));
    rounds.unshift(roundMatches); // first round at index 0
    currentLevel = nextLevel;
  }

  return rounds.length >= 2 ? rounds : null;
}

// Get round display names
function getBracketRoundNames(totalRounds) {
  const names = [];
  for (let i = 0; i < totalRounds; i++) {
    const fromEnd = totalRounds - 1 - i;
    if (fromEnd === 0) names.push('决赛');
    else if (fromEnd === 1) names.push('半决赛');
    else if (fromEnd === 2) names.push('四分之一决赛');
    else if (fromEnd === 3) names.push('八分之一决赛');
    else names.push('第' + (i+1) + '轮');
  }
  return names;
}

// Count set wins for a side
function getSetWins(scoreData, side) {
  if (!scoreData || !scoreData.sets) return 0;
  let wins = 0;
  const fieldA = 'teamA', fieldB = 'teamB';
  scoreData.sets.forEach(set => {
    const a = parseInt(set[fieldA]), b = parseInt(set[fieldB]);
    if (!isNaN(a) && !isNaN(b)) {
      if (side === 'A' && a > b) wins++;
      if (side === 'B' && b > a) wins++;
    }
  });
  return wins;
}

// Render bracket HTML
function renderBracketView(tournamentId, editable) {
  const rounds = detectBracketRounds(tournamentId);
  if (!rounds) return '';

  const scores = DB.getScores();
  const schedules = DB.getSchedules();
  const roundNames = getBracketRoundNames(rounds.length);

  let html = '<div class="bracket-wrap">';
  html += '<div class="bracket-title">🏆 淘汰赛对阵表</div>';
  html += '<div class="bracket" id="bracketView_' + tournamentId + '">';

  rounds.forEach((round, ri) => {
    html += '<div class="bracket-round">';
    html += '<div class="bracket-round-label">' + esc(roundNames[ri]) + '</div>';
    html += '<div class="bracket-round-matches">';

    round.forEach(s => {
      const sc = scores[s.id];
      const isCompleted = sc && sc.saved && sc.winner;
      const teamA = resolveTeamName(s.teamA, schedules, scores);
      const teamB = resolveTeamName(s.teamB, schedules, scores);
      const winnerA = isCompleted && sc.winner === 'A';
      const winnerB = isCompleted && sc.winner === 'B';
      const setsA = isCompleted ? getSetWins(sc, 'A') : '';
      const setsB = isCompleted ? getSetWins(sc, 'B') : '';

      html += '<div class="bracket-match" data-order="' + s.order + '" data-id="' + s.id + '">';
      html += '<div class="bm-team ' + (winnerA ? 'win' : (winnerB ? 'lose' : '')) + '">';
      html += '<span class="bm-seed">' + s.order + '</span>';
      html += '<span class="bm-name ' + (editable ? 'editable' : '') + '" title="' + esc(teamA) + '"'
        + (editable ? ' onclick="editBracketMatch(\'' + s.id + '\')"' : '') + '>' + esc(teamA) + '</span>';
      html += '<span class="bm-sets">' + (isCompleted ? setsA : '') + '</span>';
      html += '</div>';
      html += '<div class="bm-team ' + (winnerB ? 'win' : (winnerA ? 'lose' : '')) + '">';
      html += '<span class="bm-seed"></span>';
      html += '<span class="bm-name ' + (editable ? 'editable' : '') + '" title="' + esc(teamB) + '"'
        + (editable ? ' onclick="editBracketMatch(\'' + s.id + '\')"' : '') + '>' + esc(teamB) + '</span>';
      html += '<span class="bm-sets">' + (isCompleted ? setsB : '') + '</span>';
      html += '</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  html += '</div>';

  // Champion display
  const finalRound = rounds[rounds.length - 1];
  const finalMatch = finalRound[0];
  const finalScore = scores[finalMatch?.id];
  if (finalScore && finalScore.winner) {
    const champion = resolveTeamName(
      finalScore.winner === 'A' ? finalMatch.teamA : finalMatch.teamB, schedules, scores
    );
    if (!champion.match(/^场序/) && champion !== '待定') {
      html += '<div class="bracket-champion">🏆 冠军：' + esc(champion) + '</div>';
    }
  }

  html += '</div>';
  return html;
}

// Draw SVG connecting lines between bracket rounds
function drawBracketLines(tournamentId) {
  const container = document.getElementById('bracketView_' + tournamentId);
  if (!container) return;

  // Remove existing SVG
  const existing = container.querySelector('.bracket-svg');
  if (existing) existing.remove();

  const rounds = detectBracketRounds(tournamentId);
  if (!rounds || rounds.length < 2) return;

  // Collect match element positions
  const matchEls = container.querySelectorAll('.bracket-match');
  const positions = {};
  const containerRect = container.getBoundingClientRect();

  matchEls.forEach(el => {
    const order = parseInt(el.dataset.order);
    const rect = el.getBoundingClientRect();
    positions[order] = {
      right: rect.right - containerRect.left,
      left: rect.left - containerRect.left,
      y: rect.top + rect.height / 2 - containerRect.top
    };
  });

  // Create SVG
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('bracket-svg');
  svg.setAttribute('width', container.scrollWidth);
  svg.setAttribute('height', container.scrollHeight);

  function addLine(x1, y1, x2, y2) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#bdbdbd');
    line.setAttribute('stroke-width', '2');
    svg.appendChild(line);
  }

  // Draw connections for each pair of consecutive rounds
  for (let ri = 0; ri < rounds.length - 1; ri++) {
    const currentRound = rounds[ri];
    const nextRound = rounds[ri + 1];

    nextRound.forEach(nextMatch => {
      const feeders = [];
      const mA = String(nextMatch.teamA||'').match(/^场序(\d+)/);
      const mB = String(nextMatch.teamB||'').match(/^场序(\d+)/);
      if (mA) { const f = currentRound.find(s => s.order === parseInt(mA[1])); if (f) feeders.push(f); }
      if (mB) { const f = currentRound.find(s => s.order === parseInt(mB[1])); if (f) feeders.push(f); }

      if (feeders.length === 2) {
        const p1 = positions[feeders[0].order];
        const p2 = positions[feeders[1].order];
        const pN = positions[nextMatch.order];
        if (!p1 || !p2 || !pN) return;

        const midX = (Math.max(p1.right, p2.right) + pN.left) / 2;

        // Horizontal lines from feeders
        addLine(p1.right, p1.y, midX, p1.y);
        addLine(p2.right, p2.y, midX, p2.y);
        // Vertical connector
        addLine(midX, p1.y, midX, p2.y);
        // Horizontal to next match
        const midY = (p1.y + p2.y) / 2;
        addLine(midX, midY, pN.left, pN.y);
      } else if (feeders.length === 1) {
        const p1 = positions[feeders[0].order];
        const pN = positions[nextMatch.order];
        if (!p1 || !pN) return;
        addLine(p1.right, p1.y, pN.left, pN.y);
      }
    });
  }

  container.appendChild(svg);
}

// Generate knockout bracket schedules
function generateKnockoutBracket() {
  const tournaments = DB.getTournaments();
  if (!tournaments.length) { toast('请先添加赛事', 'warning'); return; }

  const maxOrder = DB.getSchedules().reduce((m, s) => Math.max(m, s.order || 0), 0);

  showModal('生成淘汰赛对阵表', `
    <p style="font-size:13px;margin-bottom:10px">自动生成第二阶段淘汰赛对阵表结构，队伍名称需后续编辑。</p>
    <div class="form-row">
      <div class="form-group"><label class="form-label">选择赛事</label>
      <select class="form-select" id="genBracketTournament">
        ${tournaments.map(t => '<option value="' + t.id + '">' + esc(t.name) + '</option>').join('')}
      </select></div>
      <div class="form-group"><label class="form-label">参赛队伍数</label>
      <select class="form-select" id="genBracketTeams">
        <option value="2">2队</option>
        <option value="4">4队</option>
        <option value="8" selected>8队</option>
        <option value="16">16队</option>
      </select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">组别</label>
      <select class="form-select" id="genBracketCategory">
        <option value="">不限</option>
        <option value="男子组">男子组</option>
        <option value="女子组">女子组</option>
      </select></div>
      <div class="form-group"><label class="form-label">起始场序</label>
      <input class="form-input" type="number" id="genBracketStartOrder" value="${maxOrder + 1}"></div>
    </div>
    <p style="font-size:11px;color:var(--text-light)">将自动创建淘汰赛赛程，后续可在赛程管理中编辑队伍名称和日期时间。</p>
  `, () => {
    const tournamentId = document.getElementById('genBracketTournament').value;
    const teamCount = parseInt(document.getElementById('genBracketTeams').value);
    const category = document.getElementById('genBracketCategory').value;
    let order = parseInt(document.getElementById('genBracketStartOrder').value) || 1;

    const schedules = DB.getSchedules();
    const roundCount = Math.log2(teamCount);
    if (roundCount !== Math.floor(roundCount) || roundCount < 1) {
      toast('队伍数必须是2的幂次（2/4/8/16）', 'error'); return;
    }

    // Generate round orders
    const allRoundOrders = [];
    let currentMatchCount = teamCount / 2;
    for (let r = 0; r < roundCount; r++) {
      const roundOrders = [];
      for (let m = 0; m < currentMatchCount; m++) {
        roundOrders.push(order++);
      }
      allRoundOrders.push(roundOrders);
      currentMatchCount = Math.floor(currentMatchCount / 2);
    }

    // Create schedule entries
    for (let r = 0; r < roundCount; r++) {
      for (let m = 0; m < allRoundOrders[r].length; m++) {
        let teamA, teamB;
        if (r === 0) {
          teamA = '待定';
          teamB = '待定';
        } else {
          const prevRound = allRoundOrders[r - 1];
          teamA = '场序' + prevRound[m * 2] + '胜者';
          teamB = '场序' + prevRound[m * 2 + 1] + '胜者';
        }
        schedules.push({
          id: genId(),
          order: allRoundOrders[r][m],
          tournamentId,
          stage: '第二阶段',
          category,
          subGroup: '',
          date: '', time: '', venue: '',
          teamA, teamB
        });
      }
    }

    DB.saveSchedules(schedules);
    closeModal();
    toast('已生成' + teamCount + '队淘汰赛对阵表（' + roundCount + '轮，' + (teamCount - 1) + '场比赛）', 'success');
    switchTab('be-scores');
  });
}

// ============================================================
// XLSX / CSV PARSER
// ============================================================
async function parseFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') return parseCSV(await file.text());
  if (ext === 'xlsx' || ext === 'xls') return parseXLSX(await file.arrayBuffer());
  toast('不支持的文件格式', 'error');
  return null;
}

function parseCSV(text) {
  return text.split(/\r?\n/).filter(l => l.trim()).map(line => {
    const result = []; let current = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { current += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(current.trim()); current = ''; }
      else current += ch;
    }
    result.push(current.trim());
    return result;
  });
}

async function parseXLSX(buffer) {
  try {
    const files = await unzip(buffer);
    const sharedStrings = [];
    if (files['xl/sharedStrings.xml']) {
      const doc = new DOMParser().parseFromString(new TextDecoder().decode(files['xl/sharedStrings.xml']), 'text/xml');
      for (const si of doc.getElementsByTagName('si')) {
        let text = '';
        for (const t of si.getElementsByTagName('t')) text += (t.textContent || '');
        sharedStrings.push(text);
      }
    }
    const sheetKey = Object.keys(files).find(k => k.match(/xl\/worksheets\/sheet\d+\.xml/));
    if (!sheetKey) { toast('无法解析xlsx文件', 'error'); return null; }
    const doc = new DOMParser().parseFromString(new TextDecoder().decode(files[sheetKey]), 'text/xml');
    const result = [];
    for (const row of doc.getElementsByTagName('row')) {
      const rowData = {}; let maxCol = 0;
      for (const cell of row.getElementsByTagName('c')) {
        const ref = cell.getAttribute('r');
        const colIdx = colLetterToIndex(ref.replace(/[0-9]/g, ''));
        const type = cell.getAttribute('t');
        const vEl = cell.getElementsByTagName('v')[0];
        const value = vEl ? vEl.textContent : '';
        rowData[colIdx] = type === 's' ? (sharedStrings[parseInt(value)] || '') : value;
        if (colIdx > maxCol) maxCol = colIdx;
      }
      const arr = [];
      for (let i = 0; i <= maxCol; i++) arr.push(rowData[i] !== undefined ? rowData[i] : '');
      result.push(arr);
    }
    return result;
  } catch (e) {
    console.error('XLSX parse error:', e);
    toast('xlsx解析失败，请尝试CSV格式', 'error');
    return null;
  }
}

function colLetterToIndex(s) {
  let idx = 0;
  for (let i = 0; i < s.length; i++) idx = idx * 26 + (s.charCodeAt(i) - 64);
  return idx - 1;
}

async function unzip(buffer) {
  const view = new DataView(buffer);
  const bytes = new Uint8Array(buffer);
  let eocdOff = buffer.byteLength - 22;
  while (eocdOff >= 0 && view.getUint32(eocdOff, true) !== 0x06054b50) eocdOff--;
  if (eocdOff < 0) throw new Error('Not a valid ZIP');
  const cdOff = view.getUint32(eocdOff + 16, true);
  const cdEntries = view.getUint16(eocdOff + 10, true);
  const files = {};
  let off = cdOff;
  for (let i = 0; i < cdEntries; i++) {
    const nameLen = view.getUint16(off + 28, true);
    const extraLen = view.getUint16(off + 30, true);
    const commentLen = view.getUint16(off + 32, true);
    const name = new TextDecoder().decode(bytes.slice(off + 46, off + 46 + nameLen));
    const localOff = view.getUint32(off + 42, true);
    const method = view.getUint16(off + 10, true);
    const compSize = view.getUint32(off + 20, true);
    const lNameLen = view.getUint16(localOff + 26, true);
    const lExtraLen = view.getUint16(localOff + 28, true);
    const dataOff = localOff + 30 + lNameLen + lExtraLen;
    const compressed = bytes.slice(dataOff, dataOff + compSize);
    files[name] = method === 0
      ? compressed.buffer.slice(compressed.byteOffset, compressed.byteOffset + compressed.byteLength)
      : await inflateRaw(compressed);
    off += 46 + nameLen + extraLen + commentLen;
  }
  return files;
}

async function inflateRaw(data) {
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(data); writer.close();
  const reader = ds.readable.getReader();
  const chunks = [];
  while (true) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); }
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const result = new Uint8Array(total);
  let pos = 0;
  for (const c of chunks) { result.set(c, pos); pos += c.length; }
  return result.buffer;
}

// ============================================================
// IMAGE COMPRESSOR
// ============================================================
function compressImage(file, maxW = 800, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('读取文件失败'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('图片加载失败'));
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderFEScoreCards(tournamentId, stageTab) {
  const schedules = DB.getSchedules().filter(s => s.tournamentId === tournamentId);
  const allScores = DB.getScores();
  if (!schedules.length) return `<div class="empty-state"><p>该赛事暂无赛程</p></div>`;

  const groupStage = schedules.filter(s => (s.stage||'小组赛') === '小组赛');
  const knockoutStage = schedules.filter(s => (s.stage||'小组赛') === '第二阶段');

  let html = '';

  if (stageTab === '小组赛' && groupStage.length) {
    html += `<div class="stage-section">
      <div class="stage-header group-stage"><span class="stage-icon">📋</span> 小组赛成绩</div>
      <div class="stage-body">`;
    const byCatGrp = {};
    groupStage.forEach(s => {
      const cat = s.category || '未分组';
      const grp = s.subGroup || s.group || '未分组';
      const key = cat + '|' + grp;
      if (!byCatGrp[key]) byCatGrp[key] = { cat, grp, list: [] };
      byCatGrp[key].list.push(s);
    });
    const sortedKeys = Object.keys(byCatGrp).sort((a, b) => {
      const ka = byCatGrp[a], kb = byCatGrp[b];
      if (ka.cat !== kb.cat) return ka.cat.localeCompare(kb.cat);
      return ka.grp.localeCompare(kb.grp);
    });
    sortedKeys.forEach(key => {
      const { cat, grp, list } = byCatGrp[key];
      list.sort((a, b) => (a.order||0) - (b.order||0));
      const label = (cat !== '未分组' ? cat + ' ' : '') + (grp !== '未分组' ? grp : '');
      html += `<div class="stage-group-card">
        <div class="stage-group-header">🏟️ ${esc(label)}</div>
        <div class="stage-group-body">
          <div class="score-grid">`;
      list.forEach(s => { html += renderScoreCard(s, allScores[s.id], false); });
      html += `</div>`;
      html += renderGroupStandings(list, allScores, true);
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }

  if (stageTab === '第二阶段' && knockoutStage.length) {
    knockoutStage.sort((a, b) => (a.order||0) - (b.order||0));
    // Add bracket view
    const bracketHtml = renderBracketView(tournamentId, false);
    html += '<div class="stage-section">';
    html += '<div class="stage-header knockout-stage"><span class="stage-icon">🏆</span> 第二阶段成绩</div>';
    html += '<div class="stage-body">';
    if (bracketHtml) html += bracketHtml;
    html += '<div class="score-grid">';
    knockoutStage.forEach(s => { html += renderScoreCard(s, allScores[s.id], false); });
    html += '</div></div></div>';
  }

  if (!html) return `<div class="empty-state"><p>该阶段暂无成绩</p></div>`;
  return html;
}

function renderGroupStandings(schedules, scores, compactLabel) {
  // Group by category first, then by subGroup
  const byCategory = {};
  schedules.forEach(s => {
    const cat = s.category || '未分组';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(s);
  });

  let html = '';
  for (const [cat, catSchedules] of Object.entries(byCategory)) {
    // Sub-group within category
    const bySubGroup = {};
    catSchedules.forEach(s => {
      const grp = s.subGroup || s.group || '未分组';
      if (!bySubGroup[grp]) bySubGroup[grp] = [];
      bySubGroup[grp].push(s);
    });

    for (const [grp, grpSchedules] of Object.entries(bySubGroup)) {
      const standings = {};
      grpSchedules.forEach(s => {
        const sc = scores[s.id];
        if (!sc || !sc.saved || !sc.winner) return;
        const teamA = s.teamA || '待定';
        const teamB = s.teamB || '待定';
        if (teamA === '待定' || teamB === '待定') return;
        if (teamA.match(/^场序/) || teamB.match(/^场序/)) return;

        if (!standings[teamA]) standings[teamA] = { name: teamA, wins: 0, losses: 0, points: 0, setsWon: 0, setsLost: 0, pointsScored: 0, pointsLost: 0 };
        if (!standings[teamB]) standings[teamB] = { name: teamB, wins: 0, losses: 0, points: 0, setsWon: 0, setsLost: 0, pointsScored: 0, pointsLost: 0 };

        if (sc.winner === 'A') {
          standings[teamA].wins++; standings[teamA].points += 2;
          standings[teamB].losses++; standings[teamB].points += 1;
        } else {
          standings[teamB].wins++; standings[teamB].points += 2;
          standings[teamA].losses++; standings[teamA].points += 1;
        }
        const sets = sc.sets || [];
        sets.forEach(set => {
          const a = parseInt(set.teamA), b = parseInt(set.teamB);
          if (!isNaN(a) && !isNaN(b)) {
            // 胜局/负局
            if (a > b) { standings[teamA].setsWon++; standings[teamB].setsLost++; }
            else if (b > a) { standings[teamB].setsWon++; standings[teamA].setsLost++; }
            // 总得分/总失分
            standings[teamA].pointsScored += a; standings[teamA].pointsLost += b;
            standings[teamB].pointsScored += b; standings[teamB].pointsLost += a;
          }
        });
      });

      // 计算C值和Z值
      const teams = Object.values(standings).map(t => {
        const cValue = t.setsLost > 0 ? (t.setsWon / t.setsLost) : (t.setsWon > 0 ? 99 : 0);
        const zValue = t.pointsLost > 0 ? (t.pointsScored / t.pointsLost) : (t.pointsScored > 0 ? 99 : 0);
        return { ...t, cValue, zValue };
      }).sort((a, b) => {
        if (b.points !== a.points) return b.points - a.points;
        if (b.cValue !== a.cValue) return b.cValue - a.cValue;
        return b.zValue - a.zValue;
      });

      if (!teams.length) continue;

      const fullLabel = (cat !== '未分组' ? cat + ' ' : '') + grp;
      const displayLabel = compactLabel ? '积分榜' : fullLabel + ' 积分榜';
      html += `<div class="group-sub-header">📊 ${esc(displayLabel)}</div>`;
      html += `<div class="card" style="margin-top:6px;margin-bottom:14px">
        <div class="table-wrap"><table class="data-table">
          <thead><tr><th>排名</th><th>队名</th><th>胜</th><th>负</th><th>胜局</th><th>负局</th><th>总得分</th><th>总失分</th><th>C值</th><th>Z值</th><th>积分</th></tr></thead>
          <tbody>${teams.map((t, i) => `<tr>
            <td>${i+1}</td><td><strong>${esc(t.name)}</strong></td>
            <td>${t.wins}</td><td>${t.losses}</td>
            <td>${t.setsWon}</td><td>${t.setsLost}</td>
            <td>${t.pointsScored}</td><td>${t.pointsLost}</td>
            <td>${t.cValue >= 99 ? '∞' : t.cValue.toFixed(2)}</td>
            <td>${t.zValue >= 99 ? '∞' : t.zValue.toFixed(2)}</td>
            <td style="font-weight:700;color:#7b1fa2">${t.points}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`;
    }
  }
  return html || '';
}

function renderFE_Points() {
  const tournaments = DB.getTournaments();
  const schedules = DB.getSchedules();
  const allScores = DB.getScores();
  const regs = DB.getRegistrations();

  if (!tournaments.length || !regs.length) {
    return `<div class="empty-state"><div class="icon">🏅</div><p>暂无队伍积分数据</p></div>`;
  }

  const teamPoints = {};

  regs.forEach(r => {
    if (!teamPoints[r.teamName]) teamPoints[r.teamName] = { totalPoints: 0, details: [] };
    const existing = teamPoints[r.teamName].details.find(d => d.tournamentId === r.tournamentId);
    if (!existing) {
      teamPoints[r.teamName].details.push({
        tournamentId: r.tournamentId,
        tournamentName: getTournamentName(r.tournamentId),
        participation: 20,
        knockoutMatches: 0,
        placement: 0,
        placementPoints: 0,
        subtotal: 20
      });
      teamPoints[r.teamName].totalPoints += 20;
    }
  });

  const placementPointsMap = {1:18, 2:14, 3:12, 4:10, 5:8, 6:6, 7:4, 8:2};
  tournaments.forEach(t => {
    const tSchedules = schedules.filter(s => s.tournamentId === t.id);
    const knockoutSchedules = tSchedules.filter(s => (s.stage||'小组赛') === '第二阶段');

    const knockoutMatchCount = {};
    knockoutSchedules.forEach(s => {
      const sc = allScores[s.id];
      if (!sc || !sc.saved || !sc.winner) return;
      const teamA = resolveTeamName(s.teamA, tSchedules, allScores);
      const teamB = resolveTeamName(s.teamB, tSchedules, allScores);
      if (teamA !== '待定' && !teamA.match(/^场序/)) {
        if (!knockoutMatchCount[teamA]) knockoutMatchCount[teamA] = 0;
        knockoutMatchCount[teamA]++;
      }
      if (teamB !== '待定' && !teamB.match(/^场序/)) {
        if (!knockoutMatchCount[teamB]) knockoutMatchCount[teamB] = 0;
        knockoutMatchCount[teamB]++;
      }
    });

    const placementMap = determinePlacement(t.id, tSchedules, allScores);

    for (const [teamName, count] of Object.entries(knockoutMatchCount)) {
      if (!teamPoints[teamName]) teamPoints[teamName] = { totalPoints: 0, details: [] };
      let detail = teamPoints[teamName].details.find(d => d.tournamentId === t.id);
      if (!detail) {
        detail = { tournamentId: t.id, tournamentName: t.name, participation: 20, knockoutMatches: 0, placement: 0, placementPoints: 0, subtotal: 20 };
        teamPoints[teamName].details.push(detail);
        teamPoints[teamName].totalPoints += 20;
      }
      detail.knockoutMatches = count;
      detail.subtotal += count;
      teamPoints[teamName].totalPoints += count;
    }

    for (const [teamName, place] of Object.entries(placementMap)) {
      if (!teamPoints[teamName]) teamPoints[teamName] = { totalPoints: 0, details: [] };
      let detail = teamPoints[teamName].details.find(d => d.tournamentId === t.id);
      if (!detail) {
        detail = { tournamentId: t.id, tournamentName: t.name, participation: 20, knockoutMatches: 0, placement: 0, placementPoints: 0, subtotal: 20 };
        teamPoints[teamName].details.push(detail);
        teamPoints[teamName].totalPoints += 20;
      }
      if (place <= 8 && placementPointsMap[place]) {
        detail.placement = place;
        detail.placementPoints = placementPointsMap[place];
        detail.subtotal += placementPointsMap[place];
        teamPoints[teamName].totalPoints += placementPointsMap[place];
      }
    }
  });

  const sortedTeams = Object.entries(teamPoints).sort((a, b) => b[1].totalPoints - a[1].totalPoints);

  if (!sortedTeams.length) return `<div class="empty-state"><div class="icon">🏅</div><p>暂无队伍积分数据</p></div>`;

  // Build table: rank | team | [each tournament subtotal] | total
  const allTournamentNames = [...new Set(sortedTeams.flatMap(([,d]) => d.details.map(x => x.tournamentName)))];
  let html = `<div class="section-header"><div class="section-title">🏅 队伍总积分</div></div>`;
  html += `<p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">
    积分规则：参加一届赛事+20分 | 进入第二阶段每场+1分 | 前八名按名次加分：1st=18 / 2nd=14 / 3rd=12 / 4th=10 / 5th=8 / 6th=6 / 7th=4 / 8th=2
  </p>`;
  html += `<div class="table-wrap"><table class="data-table">
    <thead><tr>
      <th>排名</th><th>队名</th>
      ${allTournamentNames.map(n => `<th>${esc(n)}</th>`).join('')}
      <th>总积分</th>
    </tr></thead><tbody>`;
  sortedTeams.forEach(([teamName, data], idx) => {
    const medal = idx < 3 ? ['🥇','🥈','🥉'][idx] : (idx+1)+'.';
    html += `<tr>
      <td style="font-weight:700">${medal}</td>
      <td><strong>${esc(teamName)}</strong></td>`;
    allTournamentNames.forEach(tName => {
      const detail = data.details.find(d => d.tournamentName === tName);
      if (detail && detail.subtotal > 0) {
        html += `<td style="text-align:center">${detail.subtotal}</td>`;
      } else {
        html += `<td style="text-align:center;color:var(--text-light)">-</td>`;
      }
    });
    html += `<td style="font-weight:800;color:#7b1fa2;font-size:16px">${data.totalPoints}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function determinePlacement(tournamentId, schedules, scores) {
  const knockoutSchedules = schedules
    .filter(s => s.tournamentId === tournamentId && (s.stage||'小组赛') === '第二阶段')
    .sort((a, b) => (b.order||0) - (a.order||0));

  const placementMap = {};
  if (!knockoutSchedules.length) return placementMap;

  const final = knockoutSchedules[0];
  const finalScore = scores[final.id];
  if (finalScore && finalScore.winner) {
    const winner = resolveTeamName(finalScore.winner === 'A' ? final.teamA : final.teamB, schedules, scores);
    const loser = resolveTeamName(finalScore.winner === 'A' ? final.teamB : final.teamA, schedules, scores);
    if (!winner.match(/^场序/) && winner !== '待定') placementMap[winner] = 1;
    if (!loser.match(/^场序/) && loser !== '待定') placementMap[loser] = 2;
  }

  const semis = knockoutSchedules.slice(1, 3);
  let semiLosers = [];
  semis.forEach(s => {
    const sc = scores[s.id];
    if (sc && sc.winner) {
      const loser = resolveTeamName(sc.winner === 'A' ? s.teamB : s.teamA, schedules, scores);
      if (!loser.match(/^场序/) && loser !== '待定' && !placementMap[loser]) {
        semiLosers.push(loser);
      }
    }
  });
  semiLosers.forEach(t => { if (!placementMap[t]) placementMap[t] = 3; });

  const quarters = knockoutSchedules.slice(3, 7);
  let quarterLosers = [];
  quarters.forEach(s => {
    const sc = scores[s.id];
    if (sc && sc.winner) {
      const loser = resolveTeamName(sc.winner === 'A' ? s.teamB : s.teamA, schedules, scores);
      if (!loser.match(/^场序/) && loser !== '待定' && !placementMap[loser]) {
        quarterLosers.push(loser);
      }
    }
  });
  quarterLosers.forEach(t => { if (!placementMap[t]) placementMap[t] = 5; });

  return placementMap;
}

  if (!group) { toast('请选择组别', 'warning'); return; }
  if (!contact) { toast('请输入联系人', 'warning'); return; }
  if (!phone) { toast('请输入电话', 'warning'); return; }

function deleteTournament(id) {
  if (!confirm('确定删除该赛事？相关报名和赛程不会被删除，但可能显示异常。')) return;
  DB.saveTournaments(DB.getTournaments().filter(t => t.id !== id));

}

function formatMatchDates(matchDates) {
  if (!matchDates || !matchDates.length) return '-';
  return matchDates.filter(d => d).map(d => d).join('、');
}

function collectMatchDates() {
  const list = document.getElementById('matchDateList');
  if (!list) return [];
  const inputs = list.querySelectorAll('input[type="date"]');
  return Array.from(inputs).map(inp => inp.value).filter(v => v);
}

function addMatchDateRow() {
  const list = document.getElementById('matchDateList');
  const idx = list.querySelectorAll('input[type="date"]').length;
  const row = document.createElement('div');
  row.className = 'form-row';
  row.style.marginBottom = '4px';
  row.innerHTML = `<input class="form-input" type="date" id="matchDate_${idx}"><button class="btn btn-sm btn-danger" type="button" onclick="removeMatchDate(this)" style="padding:4px 10px">✕</button>`;
  list.appendChild(row);
}

function removeMatchDate(btn) {
  const list = document.getElementById('matchDateList');
  if (list.querySelectorAll('input[type="date"]').length <= 1) { toast('至少保留一个比赛日期', 'warning'); return; }
  btn.closest('.form-row').remove();
}

function getDefaultMatchDate(tournamentId) {
  const t = DB.getTournaments().find(x => x.id === tournamentId);
  if (!t || !t.matchDates || !t.matchDates.length) return '';
  return t.matchDates[0] || '';
}
